services:
  - type: web
    name: cilza
    runtime: python
    plan: free
    rootDir: healthcakes_project
    buildCommand: bash build.sh
    startCommand: "gunicorn healthcakes_project.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: "4"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: SERVE_DEMO_MEDIA
        value: "1"
