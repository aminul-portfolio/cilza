services:
  - type: web
    name: cilza
    runtime: python
    plan: free
    rootDir: healthcakes_project
    buildCommand: bash build.sh
    startCommand: python -m gunicorn healthcakes_project.asgi:application -k uvicorn.workers.UvicornWorker
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: "4"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
